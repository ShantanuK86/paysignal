name: Retrain Model

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1"

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python src/train.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Run drift monitor
        run: python src/monitor.py